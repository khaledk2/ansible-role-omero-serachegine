---
- name:  Import a key for docker
  become: true
  ansible.builtin.rpm_key:
    state: present
    key: https://download.docker.com/linux/centos/gpg

- name: docker | setup dnf repository
  become: true
  ansible.builtin.dnf:
    update_cache: true
    state: present
    name: dnf-plugins-core

- name: docker | setup dnf repository
  become: true
  ansible.builtin.dnf:
    update_cache: true
    state: present
    name: https://download.docker.com/linux/centos/docker-ce.repo

- name: add docker repo
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  become: yes

- name: Enable and restart a docker service
  ansible.builtin.service:
    name: docker
    state: restarted
    enabled: true



