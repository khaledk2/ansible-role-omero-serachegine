- name: add docker repo
  dnf:
    name: https://download.docker.com/linux/centos/docker-ce.repo
    state: present
    update_cache: true
  become: yes

- name: add docker repo
  dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  become: yes

- name: Enable and restart a docker service
  ansible.builtin.service:
    name: docker
    state: restarted
    enabled: true



